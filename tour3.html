<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Booking - Tour.com</title>
    <link rel="stylesheet" href="tours3.css">
</head>
<body>
    <!-- Full-screen background image -->
    <img src="WhatsApp Image 2023-10-12 at 9.04.06 PM.jpeg" class="bc" alt="Mountain sunset background">

    <nav>
        <ul>
            <li><a href="tour.html">Home</a></li>
            <li><a href="tour2.html">Options</a></li>
        </ul>
    </nav>

    <div class="wrapper">
        <h1>CONFIRM BOOKING</h1>

        <form>
            <label for="fname">First Name</label><br>
            <input type="text" id="fname" name="First Name" required><br><br>

            <label for="lastname">Last Name</label><br>
            <input type="text" id="lastname" name="Lastname" required><br><br>

            <label for="DOB">Date of Birth</label><br>
            <input type="date" id="DOB" name="DOB" required><br><br>

            <label for="email">E-mail ID</label><br>
            <input type="email" id="email" name="email" placeholder="Please enter email" 
                   pattern=".+@gmail\.com" required>
            <span id="message"></span><br><br>

            <label for="destination">Select Destination</label><br>
            <select name="destination" id="destination" required>
                <option value="">-- Select --</option>
                <option value="Chota">Chhota-Imambara</option>
                <option value="Ajmer">Ajmer</option>
                <option value="Mawsynram">Mawsynram</option>
                <option value="Amritsar">Amritsar</option>
                <option value="Hampi">Hampi</option>
                <option value="Rishikesh">Rishikesh</option>
                <option value="Jaisalmer">Jaisalmer</option>
                <option value="Lonavala">Lonavala</option>
                <option value="Shimla">Shimla</option>
                <option value="Chennai">Chennai</option>
            </select><br><br>

            <label for="people">Number of People</label><br>
            <input type="number" id="quantity" name="people" min="1" max="100" required><br><br>

            <button type="button" class="submit" 
                    onclick="event.preventDefault(); location.href='tour4.html';">
                Submit
            </button>
        </form>
    </div>
</body>
</html>
