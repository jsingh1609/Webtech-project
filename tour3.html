<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Booking - Tour.com</title>
    <link rel="stylesheet" href="tours3.css">
</head>
<body>
    <!-- Full-screen background image -->
    <img src="WhatsAppImage2023-10-12at9.04.06PM.jpeg" class="bc" alt="Mountain sunset background">

    <nav>
        <ul>
            <li><a href="tour.html">Home</a></li>
            <li><a href="tour2.html">Options</a></li>
        </ul>
    </nav>

    <div class="wrapper">
        <h1>CONFIRM BOOKING</h1>

        <form id="bookingForm">
            <label for="fname">First Name</label><br>
            <input type="text" id="fname" required><br><br>

            <label for="lname">Last Name</label><br>
            <input type="text" id="lname" required><br><br>

            <label for="dob">Date of Birth</label><br>
            <input type="date" id="dob" required><br><br>

            <label for="email">E-mail ID</label><br>
            <input type="email" id="email" placeholder="Please enter email" 
                   pattern=".+@gmail\.com" title="Email must end with @gmail.com" required>
            <span id="emailError" style="color: #ff6b6b; font-size: 0.9rem;"></span><br><br>

            <label for="destination">Select Destination</label><br>
            <select id="destination" required>
                <option value="">-- Select --</option>
                <option value="Chota">Chhota-Imambara</option>
                <option value="Ajmer">Ajmer</option>
                <option value="Mawsynram">Mawsynram</option>
                <option value="Amritsar">Amritsar</option>
                <option value="Hampi">Hampi</option>
                <option value="Rishikesh">Rishikesh</option>
                <option value="Jaisalmer">Jaisalmer</option>
                <option value="Lonavala">Lonavala</option>
                <option value="Shimla">Shimla</option>
                <option value="Chennai">Chennai</option>
            </select><br><br>

            <label for="people">Number of People</label><br>
            <input type="number" id="people" min="1" max="100" required><br><br>

            <button type="button" class="submit" id="submitBtn" disabled>
                Submit
            </button>
        </form>
    </div>

    <!-- JavaScript to enable/disable Submit button -->
    <script>
        const form = document.getElementById('bookingForm');
        const submitBtn = document.getElementById('submitBtn');
        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('emailError');

        function checkForm() {
            // Get all required fields
            const requiredFields = form.querySelectorAll('[required]');
            let allFilled = true;

            // Check every required field has value
            requiredFields.forEach(field => {
                if (!field.value.trim()) {
                    allFilled = false;
                }
            });

            // Extra check for email pattern
            const emailValid = emailInput.checkValidity();

            // Enable button only if all fields filled + valid email
            submitBtn.disabled = !(allFilled && emailValid);

            // Visual feedback for email
            if (emailInput.value && !emailValid) {
                emailError.textContent = "Email must end with @gmail.com";
            } else {
                emailError.textContent = "";
            }

            // Change button appearance
            submitBtn.style.opacity = submitBtn.disabled ? "0.5" : "1";
            submitBtn.style.cursor = submitBtn.disabled ? "not-allowed" : "pointer";
        }

        // Check on every input change
        form.addEventListener('input', checkForm);
        form.addEventListener('change', checkForm);

        // Initial check
        checkForm();

        // Redirect when clicked (only if enabled)
        submitBtn.addEventListener('click', () => {
            if (!submitBtn.disabled) {
                window.location.href = 'tour4.html';
            }
        });
    </script>
</body>
</html>
