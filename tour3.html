<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Booking - Tour.com</title>
    <link rel="stylesheet" href="tours3.css">
</head>
<body>
    <!-- Full-screen background image -->
    <img src="WhatsAppImage2023-10-12at9.04.06PM.jpeg" class="bc" alt="Mountain sunset background">

    <nav>
        <ul>
            <li><a href="tour.html">Home</a></li>
            <li><a href="tour2.html">Options</a></li>
        </ul>
    </nav>

    <div class="wrapper">
        <h1>CONFIRM BOOKING</h1>

        <form id="tourForm">

            <label for="fname">First Name</label><br>
            <input type="text" name="first_name" id="fname" required><br><br>

            <label for="lname">Last Name</label><br>
            <input type="text" name="last_name" id="lname" required><br><br>

            <label for="dob">Date of Birth</label><br>
            <input type="date" name="date_of_birth" id="dob" required><br><br>

            <label for="email">E-mail ID</label><br>
            <input type="email" name="email" id="email" placeholder="Please enter email" required>
            <br><br>

            <label for="destination">Select Destination</label><br>
            <select name="destination" id="destination" required>
                <option value="">-- Select --</option>
                <option value="Chota">Chhota-Imambara</option>
                <option value="Ajmer">Ajmer</option>
                <option value="Mawsynram">Mawsynram</option>
                <option value="Amritsar">Amritsar</option>
                <option value="Hampi">Hampi</option>
                <option value="Rishikesh">Rishikesh</option>
                <option value="Jaisalmer">Jaisalmer</option>
                <option value="Lonavala">Lonavala</option>
                <option value="Shimla">Shimla</option>
                <option value="Chennai">Chennai</option>
            </select><br><br>

            <label for="people">Number of People</label><br>
            <input type="number" name="number_of_people" id="people" min="1" max="100" required><br><br>

            <button type="submit" class="submit">Submit</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('tourForm');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = new FormData(form);
            await fetch('https://formspree.io/f/myknkkpb', {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            });
            window.location.href = 'https://webtech-project-rtvs.vercel.app/tour4.html';
        });
    </script>

</body>
</html>
